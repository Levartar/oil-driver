name: Publish to Itch.io

on:
  push:
    branches: ["main"]
    paths:
    - "game/"
    - "game/**"  

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v3
         
      - name: Godot Export
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: true
        env:
          GITHUB_TOKEN: ${{secrets.GH_TOKEN}}
      - name: Publish to Itch
        uses: Ayowel/butler-to-itch@v1.3.0
        with:
          butler_key: ${{secrets.ITCHIO_SECRET}}
          itch_user: Levartar
          itch_game: oil-driver-working-title
          version: ${{ github.ref_name }}
          files: "${{ steps.export.outputs.archive_directory }}/oil-driver-web.zip"